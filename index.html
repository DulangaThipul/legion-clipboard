<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGION CLIPBOARD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main); min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            user-select: none; -webkit-user-select: none;
        }

        .container {
            width: 90%; max-width: 800px; background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; gap: 1.5rem; box-sizing: border-box;
        }

        #lockScreen { text-align: center; width: 100%; }
        #lockScreen h2 { margin-bottom: 10px; color: #f8fafc; }
        #lockScreen p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }

        .pin-input {
            width: 100%; max-width: 300px; padding: 15px;
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border);
            border-radius: 12px; color: white; font-size: 1.3rem;
            text-align: center; letter-spacing: 2px; margin-bottom: 15px;
            outline: none; box-sizing: border-box; transition: border-color 0.3s ease;
            user-select: text;
        }
        .pin-input:focus { border-color: var(--accent); }

        #appContent { display: none; flex-direction: column; gap: 1.5rem; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; }
        .title { font-size: 1.5rem; font-weight: 600; letter-spacing: 1px; background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .status { font-size: 0.875rem; display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); }
        .status::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background-color: var(--text-muted); }
        .status.synced { color: var(--success); }
        .status.synced::before { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
        .status.saving { color: #f59e0b; }
        .status.saving::before { background-color: #f59e0b; box-shadow: 0 0 8px #f59e0b; animation: pulse 1s infinite; }
        .status.error { color: var(--error); }

        textarea {
            width: 100%; height: 300px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border); border-radius: 12px;
            color: var(--text-main); font-family: inherit; font-size: 1rem;
            padding: 1rem; resize: vertical; box-sizing: border-box; outline: none;
            user-select: text;
        }

        .actions { display: flex; gap: 1rem; justify-content: flex-end; }
        button {
            background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-main);
            padding: 0.75rem 1.5rem; border-radius: 8px; font-family: inherit; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        button:hover { background: var(--accent); border-color: var(--accent); }
        button.primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); border: none; }
        .logout-btn { background: transparent; border: 1px solid var(--error); color: var(--error); width: auto; padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .logout-btn:hover { background: var(--error); color: white; }

        @media (max-width: 600px) { .container { width: 95%; padding: 1.5rem; } .actions { flex-direction: column; } .actions button { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div id="lockScreen">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 10px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <h2>Secure Access</h2>
            <p>Enter your secret password to decrypt clipboard</p>
            <input type="password" id="pinInput" class="pin-input" placeholder="Enter Password" onkeypress="handleEnter(event)">
            <button class="primary" onclick="unlockApp()" style="max-width: 300px; margin: 0 auto;">Unlock & Decrypt</button>
        </div>

        <div id="appContent">
            <div class="header">
                <h1 class="title">LEGION CLIPBOARD</h1>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div id="statusIndicator" class="status">Connecting...</div>
                    <button class="logout-btn" onclick="lockApp()">Lock</button>
                </div>
            </div>
            <textarea id="clipboardText" placeholder="Paste your Drive links or text here..."></textarea>
            <div class="actions">
                <button id="copyBtn">Copy</button>
                <button id="sendBtn" class="primary">Send Encrypted</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && ['I','C','J'].includes(String.fromCharCode(e.keyCode))) || (e.ctrlKey && e.keyCode === 'U'.charCodeAt(0))) return false;
        };

        const firebaseConfig = {
            apiKey: "AIzaSyC8fyxMmHAipvfJaX8Ngoz9PrG4NCLY_SQ",
            authDomain: "my-clipboard-d8c77.firebaseapp.com",
            databaseURL: "https://my-clipboard-d8c77-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-clipboard-d8c77",
            storageBucket: "my-clipboard-d8c77.appspot.com",
            messagingSenderId: "434004415767",
            appId: "1:434004415767:web:0699c7a18bf31ef6bed352"
        };

        const lockScreen = document.getElementById('lockScreen');
        const appContent = document.getElementById('appContent');
        const pinInput = document.getElementById('pinInput');
        const textArea = document.getElementById('clipboardText');
        const sendBtn = document.getElementById('sendBtn');
        const copyBtn = document.getElementById('copyBtn');
        const statusIndicator = document.getElementById('statusIndicator');

        let isLocalUpdate = false, dbRef = null, typingTimer, appInitialized = false;
        let globalSecretPin = "";

        const MASTER_HASH = "742ba56345d1d604473e6593b4a20f92f2549a1d596c810df2dfcfbfbf4d5a99";

        window.onload = () => {
            const savedPin = localStorage.getItem('legion_secret_pin');
            if (savedPin && CryptoJS.SHA256(savedPin).toString() === MASTER_HASH) {
                pinInput.value = savedPin;
                unlockApp(true);
            }
        };

        function handleEnter(e) { if (e.key === 'Enter') unlockApp(); }
        function updateStatus(msg, cls) { statusIndicator.textContent = msg; statusIndicator.className = 'status ' + cls; }

        function unlockApp(autoUnlock = false) {
            const pin = pinInput.value.trim();
            const inputHash = CryptoJS.SHA256(pin).toString();
            
            if (inputHash !== MASTER_HASH) {
                if (!autoUnlock) alert("Access Denied.");
                pinInput.value = '';
                return;
            }

            globalSecretPin = pin;
            localStorage.setItem('legion_secret_pin', pin);
            lockScreen.style.display = 'none';
            appContent.style.display = 'flex';

            if (!appInitialized) initFirebase();
            else attachFirebaseListener();
        }

        function lockApp() {
            localStorage.removeItem('legion_secret_pin');
            globalSecretPin = "";
            pinInput.value = '';
            appContent.style.display = 'none';
            lockScreen.style.display = 'block';
            if (dbRef) dbRef.off();
        }

        function initFirebase() {
            try {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                dbRef = firebase.database().ref('/shared_clipboard/data');
                attachFirebaseListener();
                appInitialized = true;
            } catch (error) { updateStatus('Error', 'error'); }
        }

        function attachFirebaseListener() {
            dbRef.on('value', snapshot => {
                if (isLocalUpdate) { isLocalUpdate = false; return; }
                const encryptedVal = snapshot.val();
                
                if (encryptedVal) {
                    try {
                        const bytes = CryptoJS.AES.decrypt(encryptedVal, globalSecretPin);
                        const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
                        textArea.value = decryptedText;
                        updateStatus('Synced & Decrypted', 'synced');
                    } catch (e) {
                        textArea.value = "[Decryption Failed]";
                        updateStatus('Decryption Error', 'error');
                    }
                } else {
                    textArea.value = '';
                    updateStatus('Synced', 'synced');
                }
            });
        }

        function sendToCloud() {
            if (!dbRef || !globalSecretPin) return;
            updateStatus('Encrypting & Saving...', 'saving');
            isLocalUpdate = true;

            const encryptedText = CryptoJS.AES.encrypt(textArea.value, globalSecretPin).toString();

            dbRef.set(encryptedText)
                .then(() => updateStatus('Synced Securely', 'synced'))
                .catch(() => { updateStatus('Error', 'error'); isLocalUpdate = false; });
        }

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(textArea.value);
                const orig = copyBtn.innerHTML; copyBtn.innerHTML = 'Copied!';
                setTimeout(() => copyBtn.innerHTML = orig, 2000);
            } catch (err) { alert('Failed.'); }
        });

        sendBtn.addEventListener('click', sendToCloud);
        textArea.addEventListener('input', () => {
            updateStatus('Unsaved Changes', 'saving');
            clearTimeout(typingTimer);
            typingTimer = setTimeout(sendToCloud, 1200);
        });
    </script>
</body>
</html>
