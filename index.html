<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGION CLIPBOARD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 0.5s ease-out;
            box-sizing: border-box;
        }

        /* --- Lock Screen Styles --- */
        #lockScreen {
            text-align: center;
            width: 100%;
        }
        
        #lockScreen h2 { margin-bottom: 10px; color: #f8fafc; }
        #lockScreen p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }

        .pin-input {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 5px;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .pin-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        /* --- Main App Styles --- */
        #appContent {
            display: none; /* Initially hidden */
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .status {
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .status::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
            transition: background-color 0.3s ease;
        }

        .status.synced { color: var(--success); }
        .status.synced::before { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
        
        .status.saving { color: #f59e0b; }
        .status.saving::before { background-color: #f59e0b; box-shadow: 0 0 8px #f59e0b; animation: pulse 1s infinite; }

        .status.error { color: var(--error); }
        .status.error::before { background-color: var(--error); box-shadow: 0 0 8px var(--error); }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        textarea {
            width: 100%;
            height: 300px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            padding: 1rem;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        button {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover:not(:disabled) {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        button.primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
        }

        button.primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--error);
            color: var(--error);
            width: auto;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }
        .logout-btn:hover {
            background: var(--error);
            color: white;
            border-color: var(--error);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.5); }

        @media (max-width: 600px) {
            .container { width: 95%; padding: 1.5rem; }
            .actions { flex-direction: column; }
            .actions button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Lock Screen UI -->
        <div id="lockScreen">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 10px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <h2>Secure Access</h2>
            <p>Enter your secret PIN to unlock your clipboard</p>
            <input type="password" id="pinInput" class="pin-input" placeholder="••••••••" onkeypress="handleEnter(event)">
            <button class="primary" onclick="unlockApp()" style="max-width: 300px; margin: 0 auto;">Unlock Device</button>
        </div>

        <!-- Main Clipboard UI -->
        <div id="appContent">
            <div class="header">
                <h1 class="title">LEGION CLIPBOARD</h1>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div id="statusIndicator" class="status">Connecting...</div>
                    <button class="logout-btn" onclick="lockApp()">Lock</button>
                </div>
            </div>
            
            <textarea id="clipboardText" placeholder="Paste your Drive links or text here..."></textarea>
            
            <div class="actions">
                <button id="copyBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    Copy
                </button>
                <button id="sendBtn" class="primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"></path><path d="M22 2L15 22L11 13L2 9L22 2Z"></path></svg>
                    Send to Cloud
                </button>
            </div>
        </div>

    </div>

    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <script>
        // ==========================================
        // FIREBASE CONFIGURATION (Already Set!)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyC8fyxMmHAipvfJaX8Ngoz9PrG4NCLY_SQ",
            authDomain: "my-clipboard-d8c77.firebaseapp.com",
            databaseURL: "https://my-clipboard-d8c77-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-clipboard-d8c77",
            storageBucket: "my-clipboard-d8c77.appspot.com",
            messagingSenderId: "434004415767",
            appId: "1:434004415767:web:0699c7a18bf31ef6bed352"
        };
        // ==========================================

        const lockScreen = document.getElementById('lockScreen');
        const appContent = document.getElementById('appContent');
        const pinInput = document.getElementById('pinInput');
        const textArea = document.getElementById('clipboardText');
        const sendBtn = document.getElementById('sendBtn');
        const copyBtn = document.getElementById('copyBtn');
        const statusIndicator = document.getElementById('statusIndicator');

        let isLocalUpdate = false;
        let dbRef = null;
        let typingTimer;
        let appInitialized = false;
        const doneTypingInterval = 1000;
        
        // Exact strict PIN check
        const SECRET_PIN = "80664227";

        // Check if device is already unlocked
        window.onload = () => {
            const savedPin = localStorage.getItem('legion_secret_pin');
            if (savedPin === SECRET_PIN) {
                pinInput.value = savedPin;
                unlockApp(true);
            }
        };

        function handleEnter(e) {
            if (e.key === 'Enter') unlockApp();
        }

        function updateStatus(message, className) {
            statusIndicator.textContent = message;
            statusIndicator.className = 'status ' + className;
        }

        function unlockApp(autoUnlock = false) {
            const pin = pinInput.value.trim();
            
            // Frontend strict check
            if (pin !== SECRET_PIN) {
                if (!autoUnlock) alert("Access Denied: Incorrect PIN.");
                pinInput.value = '';
                return;
            }

            // Save PIN locally for future auto-login on this device
            localStorage.setItem('legion_secret_pin', pin);
            
            lockScreen.style.display = 'none';
            appContent.style.display = 'flex';

            if (!appInitialized) {
                initFirebase(pin);
            } else {
                dbRef = firebase.database().ref('/shared_data/' + pin + '/current_text');
                attachFirebaseListener();
            }
        }

        function lockApp() {
            // Remove saved PIN and lock device
            localStorage.removeItem('legion_secret_pin');
            pinInput.value = '';
            appContent.style.display = 'none';
            lockScreen.style.display = 'block';
            if (dbRef) {
                dbRef.off(); // Stop syncing data while locked
            }
        }

        function initFirebase(pin) {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                const database = firebase.database();
                
                // Creates a secure path in the database: /shared_data/80664227/current_text
                dbRef = database.ref('/shared_data/' + pin + '/current_text');
                attachFirebaseListener();
                appInitialized = true;
                
            } catch (error) {
                console.error("Initialization error:", error);
                updateStatus('Error', 'error');
            }
        }

        function attachFirebaseListener() {
            dbRef.on('value', (snapshot) => {
                if (isLocalUpdate) {
                    isLocalUpdate = false;
                    return;
                }

                const val = snapshot.val();
                if (val !== null) {
                    textArea.value = val;
                } else {
                    textArea.value = '';
                }
                updateStatus('Synced', 'synced');
            }, (error) => {
                console.error("Firebase read error:", error);
                // If the user tries to bypass with a wrong PIN, Firebase kicks them out!
                if(error.code === 'PERMISSION_DENIED') {
                    alert("Security Alert: Permission Denied.");
                    lockApp();
                } else {
                    updateStatus('Connection Error', 'error');
                }
            });
            updateStatus('Ready', 'synced');
        }

        function sendToCloud() {
            if (!dbRef) return;

            const textToSave = textArea.value;
            updateStatus('Saving...', 'saving');
            isLocalUpdate = true;

            dbRef.set(textToSave)
                .then(() => {
                    updateStatus('Synced', 'synced');
                })
                .catch((error) => {
                    console.error("Firebase write error:", error);
                    updateStatus('Error Saving', 'error');
                    isLocalUpdate = false;
                    if(error.code === 'PERMISSION_DENIED') {
                        alert("Security Alert: Permission Denied.");
                        lockApp();
                    }
                });
        }

        async function copyToClipboard() {
            try {
                await navigator.clipboard.writeText(textArea.value);
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                }, 2000);
            } catch (err) {
                console.error('Failed to copy text: ', err);
                alert('Failed to copy to clipboard.');
            }
        }

        // Add event listeners
        sendBtn.addEventListener('click', sendToCloud);
        copyBtn.addEventListener('click', copyToClipboard);

        // Auto-save when typing stops
        textArea.addEventListener('input', () => {
            updateStatus('Unsaved Changes', 'saving');
            clearTimeout(typingTimer);
            typingTimer = setTimeout(sendToCloud, doneTypingInterval);
        });
    </script>
</body>
</html>
